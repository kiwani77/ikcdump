<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/ikcdump/favicon.ico" type="image/x-icon">
<title>CSA Study App</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Theme variables ── */
:root {
  --bg:        #1a1a2e;
  --bg2:       #16213e;
  --border:    #0f3460;
  --accent:    #e94560;
  --text:      #eeeeee;
  --text2:     #aaaaaa;
  --btn-bg:    #0f3460;
  --btn-hover: #1a4a7a;
  --sel-bg:    #1f1f3f;
  --correct-bg:#1a4a2a;
  --wrong-bg:  #4a1a1a;
  --missed-bg: #2a3a1a;
}
[data-theme="light"] {
  --bg:        #f0f4f8;
  --bg2:       #ffffff;
  --border:    #c0ccd8;
  --accent:    #e94560;
  --text:      #1a1a2e;
  --text2:     #556677;
  --btn-bg:    #dce8f4;
  --btn-hover: #b8d0e8;
  --sel-bg:    #e8f0f8;
  --correct-bg:#d4edda;
  --wrong-bg:  #f8d7da;
  --missed-bg: #e8f4d4;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Theme toggle (fixed top-right) ── */
#theme-btn {
  position: fixed;
  top: 12px;
  right: 16px;
  z-index: 999;
  background: var(--btn-bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 5px 10px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.85rem;
  transition: background 0.15s;
}
#theme-btn:hover { background: var(--btn-hover); }

/* ── Sticky mode header ── */
.mode-header {
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
  padding: 10px 16px;
  position: sticky;
  top: 0;
  z-index: 10;
}

button {
  background: var(--btn-bg);
  border: 1px solid var(--accent);
  color: var(--text);
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.9rem;
  transition: background 0.15s;
}
button:hover { background: var(--btn-hover); }
button.secondary { border-color: var(--border); }
button.secondary:hover { background: var(--btn-hover); }

section { display: none; flex: 1; padding: 20px 16px; max-width: 860px; width: 100%; margin: 0 auto; }
section.active { display: flex; flex-direction: column; }

/* ── HOME ── */
#home h2 { color: var(--accent); margin-bottom: 6px; font-size: 1.4rem; }
.home-subtitle { color: var(--text2); font-size: 0.85rem; margin-bottom: 20px; }
.domain-list { list-style: none; margin-bottom: 16px; }
.domain-list li { margin: 8px 0; }
.domain-list label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.95rem; }
.domain-list input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--accent); }
.q-count { color: var(--text2); margin-bottom: 16px; font-size: 0.95rem; }
.home-buttons { display: flex; gap: 12px; flex-wrap: wrap; }

/* ── STUDY/EXAM header bar ── */
.nav-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.q-info { color: var(--text2); font-size: 0.95rem; font-weight: bold; min-width: 80px; }
.nav-bar input[type=number] {
  width: 56px; padding: 4px 6px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); border-radius: 4px; font-size: 0.85rem;
}
.stats { color: var(--text2); font-size: 0.85rem; margin-top: 6px; display: flex; gap: 18px; flex-wrap: wrap; }
.stats .correct-c { color: #4caf50; }
.stats .wrong-c   { color: var(--accent); }
.timer { font-size: 1rem; font-weight: bold; color: var(--text); min-width: 56px; text-align: center; }
.timer.red { color: var(--accent); }

/* ── Question card ── */
.q-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 18px;
  margin-bottom: 14px;
  cursor: grab;
  user-select: none;
  flex: 1;
}
.q-card:active { cursor: grabbing; }
.q-text { font-size: 1rem; line-height: 1.5; margin-bottom: 14px; user-select: text; }
.options { list-style: none; }
.option-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 10px; margin: 5px 0;
  border: 1px solid var(--border);
  border-radius: 6px; cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
}
.option-item:hover  { border-color: var(--accent); }
.option-item.selected { border-color: var(--accent); background: var(--sel-bg); }
.option-item.correct  { background: var(--correct-bg); border-color: #4caf50; }
.option-item.wrong    { background: var(--wrong-bg);   border-color: var(--accent); }
.option-item.missed   { background: var(--missed-bg);  border-color: #8bc34a; }
.option-item input { margin-top: 2px; accent-color: var(--accent); }
.option-letter { font-weight: bold; color: var(--accent); min-width: 18px; }
.option-text { line-height: 1.4; user-select: text; }

/* ── Action bar (bottom) ── */
.action-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding: 12px 0 8px;
  align-items: center;
}
.action-bar .nav-btn { font-size: 1.1rem; padding: 6px 16px; }
.spacer { flex: 1; }

/* ── RESULTS ── */
#results h2 { font-size: 1.4rem; margin-bottom: 6px; color: var(--accent); }
.score-line { font-size: 1.2rem; margin-bottom: 18px; }
.pass { color: #4caf50; }
.fail { color: var(--accent); }
.domain-breakdown { margin-bottom: 20px; }
.domain-breakdown h3 { color: var(--accent); margin-bottom: 8px; }
.domain-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.wrong-list h3 { color: var(--accent); margin-bottom: 10px; }
.wrong-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 10px; font-size: 0.9rem; }
.wrong-item .wq { margin-bottom: 6px; line-height: 1.4; }
.wrong-item .wa { color: var(--text2); }
.wrong-item .wa span { color: var(--text); }

@media (max-width: 540px) {
  .home-buttons { flex-direction: column; }
  #theme-btn { top: 8px; right: 10px; }
}
</style>
</head>
<body>

<button id="theme-btn" onclick="toggleTheme()">☀ Light</button>

<!-- HOME -->
<section id="home" class="active">
  <h2>CSA Study App</h2>
  <p class="home-subtitle">Study mode: all selected questions &nbsp;|&nbsp; Exam mode: 10 questions per domain (60 total), 90 min</p>
  <button class="secondary" id="toggle-all-btn" onclick="toggleAllDomains()" style="margin-bottom:10px;">Uncheck All</button>
  <ul class="domain-list" id="domain-list"></ul>
  <div class="q-count" id="q-count">0 questions selected</div>
  <div class="home-buttons">
    <button onclick="startMode('study')">Study Mode</button>
    <button onclick="startMode('exam')">Exam Mode</button>
  </div>
</section>

<!-- STUDY -->
<section id="study">
  <div class="mode-header">
    <div class="nav-bar">
      <span class="q-info" id="study-qinfo">Q 1 / 0</span>
      <input type="number" id="go-input" min="1" placeholder="Go" title="Jump to question">
      <button onclick="goToQ()">Go</button>
      <button class="secondary" onclick="goHome()">&#8962; Home</button>
    </div>
    <div class="stats" id="study-stats">
      <span><span class="correct-c">&#10003;</span> Correct: <strong id="correct-count">0</strong></span>
      <span><span class="wrong-c">&#10007;</span> Wrong: <strong id="wrong-count">0</strong></span>
      <span>Remaining: <strong id="remaining-count">0</strong></span>
    </div>
  </div>
  <div class="q-card" id="study-card">
    <div class="q-text" id="study-qtext"></div>
    <ul class="options" id="study-options"></ul>
  </div>
  <div class="action-bar">
    <button class="nav-btn secondary" onclick="prevQ()">&#8592;</button>
    <button onclick="checkAnswer()">Check Answer</button>
    <button class="secondary" onclick="revealAnswer()">Reveal Answer</button>
    <!--<div class="spacer"></div>-->
    <button class="nav-btn secondary" onclick="nextQ()">&#8594;</button>
  </div>
</section>

<!-- EXAM -->
<section id="exam">
  <div class="mode-header">
    <div class="nav-bar">
      <span class="q-info" id="exam-qinfo">Q 1 / 60</span>
      <span class="timer" id="exam-timer">90:00</span>
      <button class="secondary" onclick="goHome()">&#8962; Home</button>
    </div>
  </div>
  <div class="q-card" id="exam-card">
    <div class="q-text" id="exam-qtext"></div>
    <ul class="options" id="exam-options"></ul>
  </div>
  <div class="action-bar">
    <button class="nav-btn secondary" onclick="prevQ()">&#8592;</button>
    <div class="spacer"></div>
    <button onclick="submitExam()">Submit / Finish</button>
    <!--<div class="spacer"></div>-->
    <button class="nav-btn secondary" onclick="nextQ()">&#8594;</button>
  </div>
</section>

<!-- RESULTS -->
<section id="results">
  <h2>Exam Results</h2>
  <div class="score-line" id="results-score"></div>
  <div class="domain-breakdown">
    <h3>Domain Breakdown</h3>
    <div id="results-domains"></div>
  </div>
  <div class="wrong-list">
    <h3 id="results-wrong-title"></h3>
    <div id="results-wrong"></div>
  </div>
  <button onclick="goHome()" style="margin-top:16px;">Retry (Back to Home)</button>
</section>

<script>
const QUESTIONS = [{"id": 1, "text": "What is the function of user impersonation?", "options": [{"letter": "A", "text": "Testing and visibility"}, {"letter": "B", "text": "Activate verbose logging"}, {"letter": "C", "text": "View custom perspectives"}, {"letter": "D", "text": "Unlock Application master list"}], "answer": ["A"], "multi": false, "domain": 1, "source": "dump_all"}, {"id": 2, "text": "Which group of permissions is used to control Application and Module access?", "options": [{"letter": "A", "text": "Access Control Rules"}, {"letter": "B", "text": "UI Policies"}, {"letter": "C", "text": "Roles"}, {"letter": "D", "text": "Assignment Rules"}], "answer": ["C"], "multi": false, "domain": 3, "source": "dump_all"}, {"id": 3, "text": "Which of the following are a type of client scripts supported in ServiceNow? (Choose four.)", "options": [{"letter": "A", "text": "onSubmit"}, {"letter": "B", "text": "onUpdate"}, {"letter": "C", "text": "onCellEdit"}, {"letter": "D", "text": "onLoad"}, {"letter": "E", "text": "onEdit"}, {"letter": "F", "text": "onChange"}, {"letter": "G", "text": "onSave"}], "answer": ["A", "C", "D", "F"], "multi": true, "domain": 4, "source": "dump_all"}, {"id": 4, "text": "Which one of the following modules can be used to view field settings for a table?", "options": [{"letter": "A", "text": "Tables & Columns"}, {"letter": "B", "text": "Access Control"}, {"letter": "C", "text": "Columns and Fields"}, {"letter": "D", "text": "Tables and Fields"}], "answer": ["A"], "multi": false, "domain": 5, "source": "dump_all"}, {"id": 5, "text": "What are the 5 provided Roles by ServiceNow?", "options": [{"letter": "A", "text": "System Administrator"}, {"letter": "B", "text": "Specialized Administrator"}, {"letter": "C", "text": "Fulfiller"}, {"letter": "D", "text": "Approver"}, {"letter": "E", "text": "Requester"}], "answer": ["A", "B", "C", "D", "E"], "multi": true, "domain": 3, "source": "dump_all"}, {"id": 6, "text": "A Service Catalog may include which of the following components?", "options": [{"letter": "A", "text": "Order Guides, Exchange Rates, Calendars"}, {"letter": "B", "text": "Order Guides, Catalog Items, and Interceptors"}, {"letter": "C", "text": "Catalog Items, Asset Contracts, Task Surveys"}, {"letter": "D", "text": "Record Producers, Order Guides, and Catalog Items"}], "answer": ["D"], "multi": false, "domain": 4, "source": "dump_all"}, {"id": 7, "text": "UI Policy can make fields read-only, mandatory, or hidden.", "options": [{"letter": "A", "text": "True"}, {"letter": "B", "text": "False"}], "answer": ["A"], "multi": false, "domain": 4, "source": "dump_all"}, {"id": 8, "text": "ServiceNow is a single-instance, multiple tenant architecture?", "options": [{"letter": "A", "text": "True"}, {"letter": "B", "text": "False"}], "answer": ["B"], "multi": false, "domain": 1, "source": "dump_all"}, {"id": 9, "text": "Which statement is true about business rules?", "options": [{"letter": "A", "text": "A business rule must run before a database action occurs"}, {"letter": "B", "text": "A business rule can be a piece of Javascript"}, {"letter": "C", "text": "A business rule must not run before a database action occurs"}, {"letter": "D", "text": "A business rule monitors fields on a form"}], "answer": ["B"], "multi": false, "domain": 4, "source": "dump_all"}, {"id": 10, "text": "What are the two aspects to LDAP Integration?", "options": [{"letter": "A", "text": "Data Population"}, {"letter": "B", "text": "Data formatting"}, {"letter": "C", "text": "Authorization"}, {"letter": "D", "text": "Authentication"}], "answer": ["A", "D"], "multi": true, "domain": 3, "source": "dump_all"}, {"id": 11, "text": "What defines conditions that are evaluated against users to determine which users can create, read, write, and retire knowledge articles.", "options": [{"letter": "A", "text": "User conditions"}, {"letter": "B", "text": "User info"}, {"letter": "C", "text": "User Criteria"}, {"letter": "D", "text": "User permissions"}] const DOMAIN_NAMES = {
  1: "User Interface & Navigation",
  2: "Reporting & Analytics",
  3: "Collaboration & Administration",
  4: "Service Automation",
  5: "Database Administration",
};

// --------------- Theme ---------------
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.dataset.theme === "dark";
  html.dataset.theme = isDark ? "light" : "dark";
  document.getElementById("theme-btn").textContent = isDark ? "🌙 Dark" : "☀ Light";
}

// --------------- State ---------------
let state = {
  screen: "home",
  mode: null,
  filtered: [],
  idx: 0,
  answered: {},
  correctCount: 0,
  wrongCount: 0,
  examAnswers: {},
  examDone: false,
  timerSecondsLeft: 90 * 60,
  timerInterval: null,
};

// --------------- Home ---------------
function buildHome() {
  const domainList = document.getElementById("domain-list");
  domainList.innerHTML = "";
  [1,2,3,4,5].forEach(d => {
    const li = document.createElement("li");
    li.innerHTML = `<label><input type="checkbox" class="domain-cb" value="${d}" checked>
      Domain ${d} — ${DOMAIN_NAMES[d]}</label>`;
    domainList.appendChild(li);
  });
  document.querySelectorAll(".domain-cb").forEach(cb =>
    cb.addEventListener("change", updateQCount)
  );
  updateQCount();
}

function selectedDomains() {
  return new Set([...document.querySelectorAll(".domain-cb:checked")].map(cb => +cb.value));
}

function getFiltered() {
  const domains = selectedDomains();
  return QUESTIONS.filter(q => domains.has(q.domain));
}

function updateQCount() {
  const n = getFiltered().length;
  document.getElementById("q-count").textContent = `${n} question${n !== 1 ? "s" : ""} selected for study`;
  const allChecked = [...document.querySelectorAll(".domain-cb")].every(cb => cb.checked);
  document.getElementById("toggle-all-btn").textContent = allChecked ? "Uncheck All" : "Check All";
}

function toggleAllDomains() {
  const cbs = [...document.querySelectorAll(".domain-cb")];
  const allChecked = cbs.every(cb => cb.checked);
  cbs.forEach(cb => cb.checked = !allChecked);
  updateQCount();
}

// Exam: pick 10 per selected domain (or all if < 10)
function buildExamSet() {
  const domains = selectedDomains();
  if (domains.size === 0) return [];
  const result = [];
  domains.forEach(d => {
    const pool = shuffle(QUESTIONS.filter(q => q.domain === d));
    result.push(...pool.slice(0, 10));
  });
  return shuffle(result);
}

function startMode(mode) {
  if (mode === "exam") {
    const domains = selectedDomains();
    if (domains.size === 0) { alert("Select at least one domain."); return; }
    state.filtered = buildExamSet();
  } else {
    const filtered = getFiltered();
    if (filtered.length === 0) { alert("No questions selected. Check at least one domain."); return; }
    state.filtered = [...filtered];
  }
  state.mode = mode;
  state.idx = 0;
  state.answered = {};
  state.correctCount = 0;
  state.wrongCount = 0;
  state.examAnswers = {};
  state.examDone = false;

  if (mode === "exam") {
    state.timerSecondsLeft = 90 * 60;
    clearInterval(state.timerInterval);
    state.timerInterval = setInterval(tickTimer, 1000);
    document.getElementById("exam-timer").textContent = "90:00";
    document.getElementById("exam-timer").className = "timer";
    renderExamQ();
    showScreen("exam");
  } else {
    renderStudyQ();
    showScreen("study");
  }
}

// --------------- Study ---------------
function renderStudyQ() {
  const q = state.filtered[state.idx];
  document.getElementById("study-qinfo").textContent = `Q ${state.idx + 1} / ${state.filtered.length}`;
  document.getElementById("correct-count").textContent = state.correctCount;
  document.getElementById("wrong-count").textContent = state.wrongCount;
  document.getElementById("remaining-count").textContent =
    state.filtered.length - Object.keys(state.answered).length;

  document.getElementById("study-qtext").textContent = q.text;
  const ul = document.getElementById("study-options");
  ul.innerHTML = "";
  q.options.forEach(opt => {
    const li = document.createElement("li");
    li.className = "option-item";
    li.dataset.letter = opt.letter;
    const inputType = q.multi ? "checkbox" : "radio";
    li.innerHTML = `<input type="${inputType}" name="study-opt" value="${opt.letter}">
      <span class="option-letter">${opt.letter}.</span>
      <span class="option-text">${escHtml(opt.text)}</span>`;
    li.addEventListener("click", () => {
      if (state.answered[state.idx]) return;
      const inp = li.querySelector("input");
      if (q.multi) {
        inp.checked = !inp.checked;
      } else {
        ul.querySelectorAll("input").forEach(i => i.checked = false);
        inp.checked = true;
      }
      ul.querySelectorAll(".option-item").forEach(el => el.classList.remove("selected"));
      ul.querySelectorAll("input:checked").forEach(i =>
        i.closest(".option-item").classList.add("selected")
      );
    });
    ul.appendChild(li);
  });

  const prev = state.answered[state.idx];
  if (prev) applyAnswerHighlight(q, prev.selected, prev.revealed);
}

function getStudySelected() {
  return [...document.querySelectorAll("#study-options input:checked")].map(i => i.value);
}

function checkAnswer() {
  if (state.answered[state.idx]) return;
  const q = state.filtered[state.idx];
  const selected = getStudySelected();
  if (selected.length === 0) { alert("Select an answer first."); return; }
  const correct = arraysEqual(selected.sort(), [...q.answer].sort());
  state.answered[state.idx] = { selected, revealed: false, correct };
  if (correct) state.correctCount++; else state.wrongCount++;
  applyAnswerHighlight(q, selected, false);
  renderStudyQ();
}

function revealAnswer() {
  if (state.answered[state.idx]) return;
  const q = state.filtered[state.idx];
  state.answered[state.idx] = { selected: [], revealed: true, correct: false };
  applyAnswerHighlight(q, [], true);
}

function applyAnswerHighlight(q, selected, revealed) {
  document.querySelectorAll("#study-options .option-item").forEach(li => {
    const letter = li.dataset.letter;
    const isCorrect = q.answer.includes(letter);
    const isSelected = selected.includes(letter);
    li.classList.remove("selected", "correct", "wrong", "missed");
    if (revealed) {
      if (isCorrect) li.classList.add("correct");
    } else {
      if (isSelected && isCorrect)   li.classList.add("correct");
      else if (isSelected)           li.classList.add("wrong");
      else if (isCorrect)            li.classList.add("missed");
    }
    if (isSelected) li.querySelector("input").checked = true;
  });
}

// --------------- Exam ---------------
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderExamQ() {
  const q = state.filtered[state.idx];
  document.getElementById("exam-qinfo").textContent = `Q ${state.idx + 1} / ${state.filtered.length}`;
  document.getElementById("exam-qtext").textContent = q.text;

  const ul = document.getElementById("exam-options");
  ul.innerHTML = "";
  const savedAnswers = state.examAnswers[state.idx] || new Set();

  q.options.forEach(opt => {
    const li = document.createElement("li");
    li.className = "option-item";
    li.dataset.letter = opt.letter;
    const inputType = q.multi ? "checkbox" : "radio";
    const checked = savedAnswers.has(opt.letter) ? "checked" : "";
    li.innerHTML = `<input type="${inputType}" name="exam-opt" value="${opt.letter}" ${checked}>
      <span class="option-letter">${opt.letter}.</span>
      <span class="option-text">${escHtml(opt.text)}</span>`;
    if (savedAnswers.has(opt.letter)) li.classList.add("selected");

    li.addEventListener("click", () => {
      if (state.examDone) return;
      const inp = li.querySelector("input");
      if (!state.examAnswers[state.idx]) state.examAnswers[state.idx] = new Set();
      const ans = state.examAnswers[state.idx];
      if (q.multi) {
        inp.checked = !inp.checked;
        if (inp.checked) ans.add(opt.letter); else ans.delete(opt.letter);
      } else {
        ul.querySelectorAll("input").forEach(i => i.checked = false);
        inp.checked = true;
        ans.clear();
        ans.add(opt.letter);
      }
      ul.querySelectorAll(".option-item").forEach(el => el.classList.remove("selected"));
      ul.querySelectorAll("input:checked").forEach(i =>
        i.closest(".option-item").classList.add("selected")
      );
    });
    ul.appendChild(li);
  });
}

function tickTimer() {
  if (state.timerSecondsLeft <= 0) {
    clearInterval(state.timerInterval);
    submitExam(true);
    return;
  }
  state.timerSecondsLeft--;
  const m = Math.floor(state.timerSecondsLeft / 60).toString().padStart(2, "0");
  const s = (state.timerSecondsLeft % 60).toString().padStart(2, "0");
  const el = document.getElementById("exam-timer");
  el.textContent = `${m}:${s}`;
  el.className = state.timerSecondsLeft < 300 ? "timer red" : "timer";
}

function submitExam(auto = false) {
  const answeredCount = Object.values(state.examAnswers).filter(s => s && s.size > 0).length;
  const total = state.filtered.length;
  if (!auto && answeredCount < total) {
    if (!confirm(`You have answered ${answeredCount} of ${total} questions. Submit anyway?`)) return;
  }
  clearInterval(state.timerInterval);
  state.examDone = true;
  showResults();
}

// --------------- Shared nav ---------------
function prevQ() {
  if (state.idx > 0) { state.idx--; renderQ(); }
}
function nextQ() {
  if (state.idx < state.filtered.length - 1) { state.idx++; renderQ(); }
}
function goToQ() {
  const v = parseInt(document.getElementById("go-input").value);
  if (v >= 1 && v <= state.filtered.length) {
    state.idx = v - 1;
    renderQ();
    document.getElementById("go-input").value = "";
  }
}
function renderQ() {
  if (state.mode === "study") renderStudyQ();
  else renderExamQ();
}

// --------------- Results ---------------
function showResults() {
  const questions = state.filtered;
  let correct = 0;
  const domainStats = {};
  const wrong = [];

  questions.forEach((q, i) => {
    const d = q.domain;
    if (!domainStats[d]) domainStats[d] = { correct: 0, total: 0 };
    domainStats[d].total++;
    const ans = state.examAnswers[i];
    const selected = ans ? [...ans].sort() : [];
    const isCorrect = arraysEqual(selected, [...q.answer].sort());
    if (isCorrect) { correct++; domainStats[d].correct++; }
    else wrong.push({ q, selected });
  });

  const pct = Math.round((correct / questions.length) * 100);
  const pass = pct >= 70;
  document.getElementById("results-score").innerHTML =
    `Score: <strong>${correct}/${questions.length} (${pct}%)</strong> — ` +
    `<span class="${pass ? 'pass' : 'fail'}">${pass ? 'PASS ✓' : 'FAIL ✗'}</span>`;

  const domDiv = document.getElementById("results-domains");
  domDiv.innerHTML = "";
  [1,2,3,4,5].forEach(d => {
    const st = domainStats[d];
    if (!st) return;
    const dpct = Math.round((st.correct / st.total) * 100);
    const row = document.createElement("div");
    row.className = "domain-row";
    row.innerHTML = `<span>Domain ${d}: ${DOMAIN_NAMES[d]}</span><span>${st.correct}/${st.total} (${dpct}%)</span>`;
    domDiv.appendChild(row);
  });

  document.getElementById("results-wrong-title").textContent =
    `Wrong Answers (${wrong.length})`;
  const wrongDiv = document.getElementById("results-wrong");
  wrongDiv.innerHTML = "";
  wrong.forEach(({ q, selected }) => {
    const div = document.createElement("div");
    div.className = "wrong-item";
    div.innerHTML =
      `<div class="wq">${escHtml(q.text)}</div>` +
      `<div class="wa">Your answer: <span>${selected.join(", ") || "(none)"}</span></div>` +
      `<div class="wa">Correct: <span>${q.answer.join(", ")}</span></div>`;
    wrongDiv.appendChild(div);
  });

  showScreen("results");
}

// --------------- Screen ---------------
function showScreen(name) {
  document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
  document.getElementById(name).classList.add("active");
  state.screen = name;
}
function goHome() {
  clearInterval(state.timerInterval);
  showScreen("home");
}

// --------------- Keyboard ---------------
document.addEventListener("keydown", e => {
  // Don't fire when typing in Go input
  if (e.target.tagName === "INPUT") return;
  if (state.screen === "study") {
    if (e.key === "ArrowLeft")           { prevQ(); return; }
    if (e.key === "ArrowRight")          { nextQ(); return; }
    if (e.key === "Enter")               { checkAnswer(); return; }
    if (e.key.toLowerCase() === "r")    { revealAnswer(); return; }
    const n = parseInt(e.key);
    if (n >= 1 && n <= 9) {
      document.querySelectorAll("#study-options .option-item")[n - 1]?.click();
    }
  }
  if (state.screen === "exam") {
    if (e.key === "ArrowLeft")  { prevQ(); return; }
    if (e.key === "ArrowRight") { nextQ(); return; }
  }
});

// --------------- Swipe / Drag ---------------
function addSwipe(cardId) {
  const el = document.getElementById(cardId);
  let startX = 0, dragging = false;
  el.addEventListener("touchstart", e => { startX = e.touches[0].clientX; }, { passive: true });
  el.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (dx < -50) nextQ(); else if (dx > 50) prevQ();
  });
  el.addEventListener("mousedown", e => { startX = e.clientX; dragging = true; });
  el.addEventListener("mouseup", e => {
    if (!dragging) return; dragging = false;
    const dx = e.clientX - startX;
    if (dx < -50) nextQ(); else if (dx > 50) prevQ();
  });
}
addSwipe("study-card");
addSwipe("exam-card");

// --------------- Helpers ---------------
function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  return a.every((v, i) => v === b[i]);
}
function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
          .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

buildHome();
</script>
